[module/battery]
type = internal/battery

full-at = 100
low-at = 30

battery = ${system.battery_name}
poll-interval = 5

time-format = %H:%M

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${colors.blue}

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 500
animation-charging-foreground = ${colors.blue}

format-full = 100%
format-full-prefix = "’ēĆ "
format-full-prefix-foreground = ${colors.blue}

format-low = <label-low>
format-low-prefix = "’ēä "
format-low-prefix-foreground = ${colors.blue}
label-low = %percentage%%
