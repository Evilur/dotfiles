[global/wm]
include-file = system.ini
include-file = colors.ini
include-file = modules.ini

[bar/main]
width = 100%:-30px
height = 48px
offset-x = 15px
offset-y = 15px

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = "JetBrains Mono NL:style=Bold:pixelsize=18;4"
font-1 = "Font Awesome 7 Free Solid:pixelsize=20;4"
font-2 = "Font Awesome 7 Free:pixelsize=15;4"

wm-restack = bspwm
cursor-click = pointer

modules-left = blank cpu sep memory sep cpu_temperature sep gpu_temperature sep
modules-center = sep bspwm sep
modules-right = tray sep xkeyboard sep network sep pulseaudio sep date blank

[bar/laptop]
inherit = bar/main
modules-right = tray sep xkeyboard sep network blank wifi sep pulseaudio sep battery sep date blank
